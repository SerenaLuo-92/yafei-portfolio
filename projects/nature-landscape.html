<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>自然之境 · 作品详情</title>
  <style>
    :root{--ink:#151817;--muted:#6f7b77}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#effaf7,#eaf5f7 50%,#f7f1e9);color:var(--ink);font-family:Arial,'Microsoft YaHei',sans-serif}
    .page{width:min(1120px,calc(100% - 36px));margin:0 auto;padding:34px 0 70px}
    .back{color:var(--ink);text-decoration:none;font-size:12px;font-weight:600}
    .card{margin-top:34px;padding:38px;border:1px solid rgba(255,255,255,.78);border-radius:28px;background:rgba(255,255,255,.48);box-shadow:0 24px 70px rgba(42,102,92,.12),inset 0 1px 0 rgba(255,255,255,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
    .meta{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.5px}
    .hero{display:grid;grid-template-columns:1fr 1.15fr;gap:38px;align-items:center}
    .hero h1{margin:18px 0 14px;font-size:clamp(40px,6vw,72px);font-weight:500;line-height:.95;letter-spacing:-3px}
    .hero p{max-width:420px;color:var(--muted);font-size:14px;line-height:1.8}
    .cover{overflow:hidden;border-radius:20px;border:1px solid rgba(255,255,255,.78);box-shadow:0 18px 40px rgba(42,102,92,.1)}
    .cover img{display:block;width:100%;height:auto}
    .intro{margin:28px 0 0;color:var(--muted);font-size:12px;line-height:1.8}
    .category{margin-top:38px}
    .category-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(80,110,101,.16)}
    .category h2{margin:0;font-size:25px;font-weight:500;letter-spacing:-1px}
    .category-head span{color:var(--muted);font-size:11px}
    .gallery{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .amazon-gallery{align-items:start}
    .amazon-side-stack{display:grid;gap:14px;align-content:start}
    .gallery figure{margin:0;overflow:hidden;border-radius:16px;border:1px solid rgba(255,255,255,.78);background:rgba(255,255,255,.42);box-shadow:0 14px 32px rgba(42,102,92,.08)}
    .gallery img{display:block;width:100%;height:auto;object-fit:contain;transition:transform .45s ease}
    .gallery figure:hover img{transform:scale(1.035)}
    .gallery figcaption{padding:11px 13px;color:var(--muted);font-size:11px}
    .note{margin-top:30px;color:var(--muted);font-size:11px}
    @media(max-width:780px){.card{padding:24px}.hero{grid-template-columns:1fr}.hero h1{font-size:48px}.gallery{grid-template-columns:repeat(2,minmax(0,1fr))}.amazon-side-stack{gap:14px}}
    @media(max-width:480px){.gallery{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="page">
    <a class="back" href="../index.html">← 返回作品集</a>
    <section class="card">
      <div class="hero">
        <div>
          <div class="meta">视觉设计 / 2026</div>
          <h1>自然之境</h1>
          <p>用视觉语言传递回归自然的生活哲学。</p>
        </div>
        <div class="cover"><img src="../images/nature-landscape/posters/poster-01.png" alt="自然之境森林湖泊主题海报"></div>
      </div>
      <p class="intro">本项目将电商视觉、商业广告与海报设计归入同一套“自然之境”视觉档案，展示从产品卖点提炼、广告叙事到自然主题海报的完整表达路径。</p>

      <section class="category">
        <div class="category-head"><h2>温暖细腻的亚马逊电商设计</h2><span>Amazon E-commerce · 5 项</span></div>
        <div class="gallery amazon-gallery">
           <figure><img loading="lazy" src="../images/nature-landscape/amazon/amazon-02.jpg" alt="亚马逊电商设计 02"><figcaption>简约温润 · 家居场景表达</figcaption></figure>
           <figure><img loading="lazy" src="../images/nature-landscape/amazon/amazon-04.jpg" alt="亚马逊电商设计 04"><figcaption>精致克制 · 细节质感呈现</figcaption></figure>
           <div class="amazon-side-stack">
             <figure><img loading="lazy" src="../images/nature-landscape/amazon/amazon-05.png" alt="亚马逊电商设计 05"><figcaption>自然舒缓 · 使用体验说明</figcaption></figure>
             <figure><img loading="lazy" src="../images/nature-landscape/amazon/amazon-01.png" alt="亚马逊电商设计 01"><figcaption>柔和暖光 · 遥控操作展示</figcaption></figure>
             <figure><img loading="lazy" src="../images/nature-landscape/amazon/amazon-03.png" alt="亚马逊电商设计 03"><figcaption>清晰直观 · 功能卖点拆解</figcaption></figure>
           </div>
        </div>
      </section>

      <section class="category">
        <div class="category-head"><h2>明亮活泼的商业广告</h2><span>Commercial Advertising · 6 项</span></div>
        <div class="gallery">
          <figure><img loading="lazy" src="../images/nature-landscape/commercial/commercial-01.png" alt="商业广告设计 01"><figcaption>明亮童趣 · 创意场景广告</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/commercial/commercial-02.png" alt="商业广告设计 02"><figcaption>鲜活大胆 · 品牌情绪海报</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/commercial/commercial-03.png" alt="商业广告设计 03"><figcaption>轻松俏皮 · 角色故事叙事</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/commercial/commercial-04.png" alt="商业广告设计 04"><figcaption>温暖亲和 · 日常生活想象</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/commercial/commercial-05.png" alt="商业广告设计 05"><figcaption>清新自然 · 花园主题传播</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/commercial/commercial-06.png" alt="商业广告设计 06"><figcaption>梦幻沉浸 · 多场景视觉延展</figcaption></figure>
        </div>
      </section>

      <section class="category">
        <div class="category-head"><h2>沉浸诗意的海报设计</h2><span>Poster Design · 11 项</span></div>
        <div class="gallery">
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-01.png" alt="自然主题海报 01"><figcaption>静谧森林 · 湖面倒影</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-02.png" alt="自然主题海报 02"><figcaption>清透晨雾 · 山林呼吸</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-03.png" alt="自然主题海报 03"><figcaption>诗意留白 · 秋日山河</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-04.png" alt="自然主题海报 04"><figcaption>深绿宁静 · 野趣生长</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-05.png" alt="自然主题海报 05"><figcaption>柔和光影 · 自然疗愈</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-06.png" alt="自然主题海报 06"><figcaption>苍翠层叠 · 林间远望</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-07.png" alt="自然主题海报 07"><figcaption>轻盈通透 · 植物意象</figcaption></figure>
          <figure><img loading="lazy" src="../images/nature-landscape/posters/poster-08.png" alt="自然主题海报 08"><figcaption>静雅克制 · 山水构图</figcaption></figure>
        </div>
      </section>

      <p class="note"></p>
    </section>
  </main>
</body>
</html>
